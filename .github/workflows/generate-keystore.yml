name: Generate Release Keystore (run once)

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Keystore password (save this!)'
        required: true
      key_password:
        description: 'Key password (save this!)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore snakesladders-release.jks \
            -alias snakesladders \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Bangsi Games, OU=Mobile, O=Bangsi Games, L=Unknown, ST=Unknown, C=PT" \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -storetype JKS

      - name: Print base64 (add this as KEYSTORE_BASE64 secret)
        run: base64 -w 0 snakesladders-release.jks

      - name: Upload keystore as artifact (backup copy)
        uses: actions/upload-artifact@v4
        with:
          name: snakesladders-release-keystore
          path: snakesladders-release.jks
          retention-days: 1
