name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: mkdir -p www && cp -r index.html css js resources www/

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons and splash
        run: npx @capacitor/assets generate --android

      - name: Sync web assets
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/snakesladders-release.jks

      - name: Build signed release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: snakesladders-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: snakesladders
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks android/app/snakesladders-release.jks \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias snakesladders \
            --out snakesladders-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: snakesladders-release
          path: snakesladders-release-signed.apk
          retention-days: 30
