name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: mkdir -p www && cp -r index.html css js resources www/

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons and splash
        run: npx @capacitor/assets generate --android

      - name: Sync web assets
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/snakesladders-release.jks

      - name: Configure Gradle signing
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android {
            signingConfigs {
              release {
                storeFile file("snakesladders-release.jks")
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias "snakesladders"
                keyPassword System.getenv("KEY_PASSWORD")
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          EOF

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: snakesladders-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
