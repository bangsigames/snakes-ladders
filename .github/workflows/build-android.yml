name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp -r index.html css js img www/
          [ -d assets ] && cp -r assets www/ || true

      - name: Add Android platform
        run: npx cap add android

      - name: Enable immersive fullscreen
        run: python3 scripts/patch-immersive.py

      - name: Sync web assets
        run: npx cap sync android

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate app icons
        run: |
          for entry in "48:mdpi" "72:hdpi" "96:xhdpi" "144:xxhdpi" "192:xxxhdpi"; do
            size="${entry%%:*}"
            dpi="${entry##*:}"
            convert resources/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${dpi}/ic_launcher.png
            convert resources/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-${dpi}/ic_launcher_round.png
          done
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: snakes-ladders-${{ github.ref_name }}
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: My Snakes & Ladders ${{ github.ref_name }}
          body: |
            ## My Snakes & Ladders ${{ github.ref_name }}
            Download and install the APK on your Android device.
            Enable "Install from unknown sources" if prompted.
